spring:
  application:
    name: vulncollab-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/vulncollab?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:vulncollab}
    password: ${DB_PASSWORD:vulncollab_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  vulnerable-mode: ${APP_VULNERABLE_MODE:true}
  public-domain: ${APP_PUBLIC_DOMAIN:lab.example.com}
  lab-warning-enabled: ${APP_LAB_WARNING_ENABLED:true}
  challenge-submit-enabled: ${APP_CHALLENGE_SUBMIT_ENABLED:true}
  secure-mode-banner-enabled: ${APP_SECURE_MODE_BANNER_ENABLED:true}

security:
  jwt:
    secret: ${JWT_SECRET:secret123}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

upload:
  dir: ${UPLOAD_DIR:./uploads}
  max-size: ${UPLOAD_MAX_SIZE:5MB}

cors:
  mode: ${CORS_MODE:vulnerable-or-secure}

deployment:
  environment: ${DEPLOYMENT_ENVIRONMENT:local}
  expose-vulnerable-lab: ${DEPLOYMENT_EXPOSE_VULNERABLE_LAB:false}

lab:
  safety:
    warning-banner-required: ${LAB_WARNING_BANNER_REQUIRED:true}
    access-restriction-required: ${LAB_ACCESS_RESTRICTION_REQUIRED:true}
    basic-auth-recommended: ${LAB_BASIC_AUTH_RECOMMENDED:true}
    ip-allowlist-recommended: ${LAB_IP_ALLOWLIST_RECOMMENDED:true}
    vpn-recommended: ${LAB_VPN_RECOMMENDED:true}
    noindex-required: ${LAB_NOINDEX_REQUIRED:true}
    robots-disallow-required: ${LAB_ROBOTS_DISALLOW_REQUIRED:true}
    legal-warning: ${LAB_LEGAL_WARNING:This intentionally vulnerable lab is for authorized owner-controlled training only.}
