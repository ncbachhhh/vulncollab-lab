app:
  vulnerable-mode: false
  lab-warning-enabled: false
  secure-mode-banner-enabled: true

deployment:
  environment: prod
  expose-vulnerable-lab: false

security:
  jwt:
    secret: ${JWT_SECRET}

lab:
  safety:
    warning-banner-required: false
    access-restriction-required: true
    noindex-required: true
    robots-disallow-required: true

spring:
  jpa:
    show-sql: false
