services:
  mysql:
    image: mysql:8.4
    container_name: vulncollab-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vulncollab}
      MYSQL_USER: ${MYSQL_USER:-vulncollab}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vulncollab_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-vulncollab_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - vulncollab_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: vulncollab-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - vulncollab_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: vulncollab-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

volumes:
  vulncollab_mysql_data:
  vulncollab_redis_data:
